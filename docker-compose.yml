services:
  postgres:
    image: postgres:16-alpine
    container_name: finroots-postgres
    environment:
      POSTGRES_DB: finroots
      POSTGRES_USER: finroots
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finroots_dev_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finroots"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: development
    container_name: finroots-backend
    environment:
      DATABASE_URL: postgres://finroots:${DB_PASSWORD:-finroots_dev_2026}@postgres:5432/finroots
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: finroots
      DB_USER: finroots
      DB_PASSWORD: ${DB_PASSWORD:-finroots_dev_2026}
      JWT_SECRET: ${JWT_SECRET:-finroots-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: development
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - finroots-uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: finroots-frontend
    ports:
      - "4200:4200"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  pgdata:
    name: finroots-pgdata
  finroots-uploads:
    name: finroots-uploads
